services:
  postgres:
    image: postgres:16
    container_name: parksmart-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-parksmart}
    ports:
      - "5432:5432"
    volumes:
      - parksmart_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-parksmart}"]
      interval: 5s
      timeout: 5s
      retries: 30
    tty: true

  api:
    build:
      context: .
      dockerfile: DockerFiles/Dockerfile.api
    container_name: parksmart-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-parksmart}
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    tty: true

volumes:
  parksmart_postgres_data:
